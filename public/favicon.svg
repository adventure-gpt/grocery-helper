<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#16a34a"/>
  <g transform="translate(50,50)">
    <!-- Cart body -->
    <path d="M-25,0 L-20,-18 L22,-18 L18,2 L-15,2 Z" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart handle -->
    <path d="M-25,0 L-32,-5" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <!-- Wheels -->
    <circle cx="-12" cy="10" r="4" fill="white"/>
    <circle cx="14" cy="10" r="4" fill="white"/>
    <!-- Items in cart -->
    <circle cx="-5" cy="-8" r="5" fill="#bbf7d0"/>
    <circle cx="7" cy="-10" r="4" fill="#fde68a"/>
    <circle cx="1" cy="-2" r="3" fill="#fca5a5"/>
  </g>
</svg>
